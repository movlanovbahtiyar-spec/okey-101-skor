<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="101 Okey">
<link rel="manifest" href="manifest.json">
<title>101 &amp; Okey — Skor</title>

<!-- CDN'ler -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{font-family:'Inter',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
.font-playfair{font-family:'Playfair Display',serif}

/* Arka plan */
body{background:#f5f0e8;min-height:100dvh}

/* Renk paleti: Old Money */
:root{
  --cream:#f5f0e8; --cream2:#ede7d9;
  --navy:#1e3a5f; --navy2:#152d4a;
  --gold:#c9a84c; --gold2:#e8c76a;
  --red:#c0392b; --green:#1a6b47;
  --border:#ddd5c0;
}

/* Kartlar */
.card{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.card-navy{background:var(--navy);border-color:var(--navy2)}

/* Dealer badge */
@keyframes dealerPulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.6)}50%{box-shadow:0 0 0 8px rgba(201,168,76,0)}}
.dealer-badge{animation:dealerPulse 2s infinite;background:var(--gold);color:var(--navy);font-weight:800;font-size:9px;padding:2px 7px;border-radius:100px;letter-spacing:.08em}

/* Score input */
.sc-inp{border:1.5px solid var(--border);border-radius:10px;padding:0 12px;height:42px;font-size:15px;font-weight:700;color:var(--navy);background:#fdfaf5;width:100%;outline:none;text-align:center;-moz-appearance:textfield}
.sc-inp:focus{border-color:var(--navy);background:#fff}
.sc-inp::-webkit-outer-spin-button,.sc-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.sc-inp.err{border-color:var(--red)!important;background:#fff5f5!important}

/* Toggle switch */
.sw-track{width:44px;height:24px;background:#ddd5c0;border-radius:100px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.sw-track.on{background:var(--gold)}
.sw-thumb{width:20px;height:20px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.sw-track.on .sw-thumb{left:22px}

/* Rank badges */
.rb{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.rb-1{background:linear-gradient(135deg,#f59e0b,#fcd34d);color:#78350f;box-shadow:0 2px 8px #f59e0b55}
.rb-2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#1e293b}
.rb-3{background:linear-gradient(135deg,#b45309,#d97706);color:#fff}
.rb-4{background:#f1f5f9;color:#94a3b8}

/* Score animation */
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.1)}100%{transform:scale(1)}}
.sc-pop{animation:pop .28s cubic-bezier(.34,1.56,.64,1)}

/* Name editable */
.nm{outline:none;border-radius:4px;padding:0 2px}
.nm:focus{background:#f0ede6}

/* History */
.h-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f0e8}
.h-row:last-child{border-bottom:none}

/* Scrollbar */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#ddd5c0;border-radius:2px}

/* Player colors (chart + avatars) */
.pc0{color:#2563eb}.pc1{color:#16a34a}.pc2{color:#d97706}.pc3{color:#dc2626}
.bg0{background:#2563eb}.bg1{background:#16a34a}.bg2{background:#d97706}.bg3{background:#dc2626}

/* Modal overlay */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}

/* Story card (Instagram formatı 9:16) */
#story-card{width:360px;min-height:640px;background:linear-gradient(155deg,#1e3a5f 0%,#0f2340 60%,#1a2e50 100%);border-radius:24px;padding:32px 24px;color:#fff;display:flex;flex-direction:column}

/* Buton stilleri */
.btn-navy{background:var(--navy);color:#fff;border:none;border-radius:11px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;height:42px;padding:0 16px}
.btn-navy:active{background:var(--navy2);transform:scale(.96)}
.btn-gold{background:var(--gold);color:var(--navy);border:none;border-radius:11px;font-weight:800;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;height:42px;padding:0 16px}
.btn-gold:active{background:var(--gold2);transform:scale(.96)}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--border);border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;height:34px;padding:0 6px;transition:all .15s}
.btn-outline:active{background:#f5f0e8;transform:scale(.95)}
.btn-red{background:transparent;color:var(--red);border:1.5px solid #f5c6c2;border-radius:10px;font-weight:600;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;height:34px;padding:0 6px;transition:all .15s}
.btn-red:active{background:#fff5f5;transform:scale(.95)}
</style>
</head>
<body>
<div class="max-w-sm mx-auto px-3.5 pt-5 pb-12">

<!-- ═══ QR PANEL ═══ -->
<div id="qr-panel" class="card mb-3" style="display:none">
  <div class="p-5">
    <p class="text-[10px] font-bold tracking-[.2em] text-gray-400 uppercase text-center mb-4">Oyuna Davet Et</p>
    <div class="flex justify-center" id="qr-code"></div>
    <p class="text-[10px] text-center text-gray-400 mt-3 break-all leading-relaxed" id="qr-url"></p>
  </div>
</div>

<!-- ═══ HEADER ═══ -->
<header class="card card-navy p-4 mb-3">
  <div class="flex items-start justify-between mb-3">
    <div>
      <p class="text-[9px] font-bold tracking-[.25em] uppercase mb-1" style="color:rgba(201,168,76,.7)">SKOR TAKİP</p>
      <h1 class="font-playfair text-2xl font-bold text-white leading-none">101 &amp; Okey</h1>
    </div>
    <div class="flex gap-2">
      <!-- QR -->
      <button onclick="toggleQR()" id="qr-btn" title="Paylaş"
        class="w-10 h-10 rounded-xl flex items-center justify-center transition-all"
        style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="2.5" y="2.5" width="8" height="8" rx="1.5" stroke="white" stroke-width="1.8"/>
          <rect x="13.5" y="2.5" width="8" height="8" rx="1.5" stroke="white" stroke-width="1.8"/>
          <rect x="2.5" y="13.5" width="8" height="8" rx="1.5" stroke="white" stroke-width="1.8"/>
          <rect x="4.5" y="4.5" width="4" height="4" rx=".5" fill="white"/>
          <rect x="15.5" y="4.5" width="4" height="4" rx=".5" fill="white"/>
          <rect x="4.5" y="15.5" width="4" height="4" rx=".5" fill="white"/>
          <rect x="13.5" y="13.5" width="2.5" height="2.5" rx=".5" fill="white"/>
          <rect x="18" y="13.5" width="3.5" height="2.5" rx=".5" fill="white"/>
          <rect x="13.5" y="18" width="3.5" height="3.5" rx=".5" fill="white"/>
          <rect x="19" y="19" width="2.5" height="2.5" rx=".5" fill="white"/>
        </svg>
      </button>
      <!-- Reset -->
      <button onclick="resetGame()" title="Sıfırla"
        class="w-10 h-10 rounded-xl flex items-center justify-center transition-all active:scale-90"
        style="background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.35)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Mode toggle + hint -->
  <div class="flex items-center justify-between">
    <div style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:100px;padding:3px;display:inline-flex">
      <button class="t-btn active" id="mode-101" onclick="setMode('101')"
        style="border-radius:100px;padding:6px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:none;background:#fff;color:#1e3a5f;box-shadow:0 2px 10px rgba(0,0,0,.2)">101</button>
      <button class="t-btn" id="mode-okey" onclick="setMode('okey')"
        style="border-radius:100px;padding:6px 20px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:none;background:transparent;color:rgba(255,255,255,.5)">Okey</button>
    </div>
    <span id="mode-hint" class="text-[11px] font-semibold" style="color:rgba(255,255,255,.4)"></span>
  </div>
</header>

<!-- ═══ DEALER + ÇIFT GIDIYOR BAR ═══ -->
<div class="card mb-3 px-4 py-3 flex items-center justify-between gap-3">
  <!-- Dealer -->
  <div class="flex items-center gap-2 min-w-0">
    <div class="w-8 h-8 rounded-full flex items-center justify-center text-white font-black text-sm flex-shrink-0" id="dealer-avatar" style="background:#1e3a5f"></div>
    <div class="min-w-0">
      <p class="text-[9px] font-bold tracking-widest uppercase" style="color:#c9a84c">DAĞITICı</p>
      <p class="text-sm font-bold text-gray-800 truncate" id="dealer-name">Oyuncu 1</p>
    </div>
    <span class="dealer-badge">🃏 DAĞITIYOR</span>
  </div>
  <!-- Çift gidiyor switch -->
  <div class="flex items-center gap-2 flex-shrink-0">
    <span class="text-[11px] font-bold" style="color:#1e3a5f">Çift</span>
    <div class="sw-track" id="double-sw" onclick="toggleDouble()">
      <div class="sw-thumb"></div>
    </div>
  </div>
</div>

<!-- ═══ PLAYER CARDS 2×2 ═══ -->
<div class="grid grid-cols-2 gap-2.5 mb-3" id="players-grid"></div>

<!-- ═══ EL KAYDET BUTONU ═══ -->
<button onclick="saveRound()" id="save-round-btn"
  class="btn-gold w-full mb-3 text-base font-bold"
  style="height:50px;border-radius:14px;font-family:'Playfair Display',serif;letter-spacing:.02em;box-shadow:0 4px 16px rgba(201,168,76,.35)">
  ✓ Eli Kaydet &amp; Sıradaki El
</button>

<!-- ═══ HISTORY ═══ -->
<div class="card mb-3">
  <div class="p-4">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-[11px] font-black uppercase tracking-[.15em]" style="color:#1e3a5f">Skor Geçmişi</h2>
      <span class="text-[10px] font-bold text-gray-400" id="hist-count">0 el</span>
    </div>
    <div id="hist-list" class="max-h-56 overflow-y-auto">
      <p class="text-center text-xs text-gray-300 py-5">Henüz el oynanmadı</p>
    </div>
  </div>
</div>

<!-- ═══ ANALİTİK + PAYLAŞ BUTONLARI ═══ -->
<div class="flex gap-2 mb-3">
  <button onclick="showAnalytics()" class="btn-navy flex-1 gap-1.5">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Analitik
  </button>
  <button onclick="shareStory()" class="btn-gold flex-1 gap-1.5">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
    Paylaş
  </button>
</div>

</div><!-- end container -->


<!-- ═══ ANALİTİK MODALİ ═══ -->
<div id="analytics-modal" class="modal-bg" style="display:none" onclick="closeModal('analytics-modal')">
  <div class="card w-full max-w-sm" style="max-height:90dvh;overflow-y:auto" onclick="event.stopPropagation()">
    <div class="p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-playfair text-xl font-bold" style="color:#1e3a5f">Oyun Analizi</h2>
        <button onclick="closeModal('analytics-modal')" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
      </div>
      <!-- Unvanlar -->
      <div class="grid grid-cols-2 gap-2 mb-5" id="titles-grid"></div>
      <!-- Grafik -->
      <div class="mb-2">
        <p class="text-[10px] font-bold tracking-widest uppercase mb-3" style="color:#c9a84c">El Bazında Puan Grafiği</p>
        <canvas id="score-chart" height="200"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- ═══ STORY MODALİ ═══ -->
<div id="story-modal" class="modal-bg" style="display:none" onclick="closeModal('story-modal')">
  <div onclick="event.stopPropagation()" class="flex flex-col items-center gap-4">
    <div id="story-card">
      <!-- JS ile doldurulacak -->
    </div>
    <button onclick="downloadStory()" class="btn-gold" style="width:360px;height:50px;border-radius:14px;font-size:15px">
      ⬇ Görsel Olarak İndir
    </button>
    <button onclick="closeModal('story-modal')" class="text-white/60 text-sm font-medium">Kapat</button>
  </div>
</div>


<script>
// ═══ SABITLER ══════════════════════════════════════
const PLAYER_COLORS = ['#2563eb','#16a34a','#d97706','#dc2626'];
const BG_COLORS     = ['#dbeafe','#dcfce7','#fef3c7','#fee2e2'];

// ═══ STATE ═════════════════════════════════════════
let S = {
  mode: '101',
  players: [
    {name:'Oyuncu 1',score:0},
    {name:'Oyuncu 2',score:0},
    {name:'Oyuncu 3',score:0},
    {name:'Oyuncu 4',score:0}
  ],
  rounds: [],        // [{el,p0,p1,p2,p3,cumul:[...]}]
  dealer: 0,
  double: false,
  moveNo: 0,
  history: []        // ham hamle geçmişi (hızlı ekle için)
};

let qrVisible=false, qrBuilt=false, chartInst=null;

// ═══ PERSIST ════════════════════════════════════════
function load(){
  try{const r=localStorage.getItem('okey101_v3');if(r)S=JSON.parse(r);}catch(_){}
}
function save(){localStorage.setItem('okey101_v3',JSON.stringify(S));}

// ═══ RANKS ══════════════════════════════════════════
function ranks(){
  const arr=S.players.map((p,i)=>({i,s:p.score}));
  arr.sort((a,b)=>S.mode==='101'?a.s-b.s:b.s-a.s);
  const r={};arr.forEach((p,pos)=>{r[p.i]=pos+1;});return r;
}

// ═══ DEALER ═════════════════════════════════════════
function renderDealer(){
  const p=S.players[S.dealer];
  const av=document.getElementById('dealer-avatar');
  const nm=document.getElementById('dealer-name');
  if(av){av.textContent=(S.dealer+1).toString();av.style.background=PLAYER_COLORS[S.dealer];}
  if(nm)nm.textContent=p.name;
}

// ═══ DOUBLE SWITCH ══════════════════════════════════
function toggleDouble(){
  S.double=!S.double;
  const sw=document.getElementById('double-sw');
  if(sw)sw.classList.toggle('on',S.double);
  save();
  // Gösterge metni güncelle
  const btn=document.getElementById('save-round-btn');
  if(btn)btn.textContent=S.double?'✓ Eli Kaydet (×2) & Sıradaki El':'✓ Eli Kaydet & Sıradaki El';
}

// ═══ ADD SCORE (hızlı butonlar) ═════════════════════
function addScore(idx,amount){
  const real=S.double?amount*2:amount;
  S.players[idx].score+=real;
  S.moveNo++;
  S.history.unshift({
    no:S.moveNo,idx,name:S.players[idx].name,
    amount:real,total:S.players[idx].score,
    time:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})
  });
  save();renderAll();
  requestAnimationFrame(()=>{
    const el=document.getElementById('sc-'+idx);
    if(!el)return;
    el.classList.remove('sc-pop');void el.offsetWidth;el.classList.add('sc-pop');
  });
}

function addCustom(idx){
  const inp=document.getElementById('inp-'+idx);
  const val=parseFloat(inp.value);
  if(isNaN(val)||val===0){
    inp.classList.add('err');setTimeout(()=>inp.classList.remove('err'),700);inp.focus();return;
  }
  addScore(idx,val);inp.value='';
}

// ═══ EL KAYDET ══════════════════════════════════════
function saveRound(){
  // Boş el mi?
  const allZero=S.players.every(p=>p.score===0)&&S.rounds.length===0;
  if(allZero){alert('Önce puan girin!');return;}

  // Mevcut toplam skorları kaydet
  const entry={
    el:S.rounds.length+1,
    scores:S.players.map(p=>p.score),
    dealer:S.dealer,
    double:S.double
  };
  S.rounds.push(entry);

  // Dealer bir ileri
  S.dealer=(S.dealer+1)%4;

  save();
  renderAll();
  renderDealer();

  // Kısa feedback
  const btn=document.getElementById('save-round-btn');
  const orig=btn.textContent;
  btn.textContent='✓ El Kaydedildi!';
  btn.style.background='#1a6b47';
  btn.style.color='#fff';
  setTimeout(()=>{
    btn.textContent=S.double?'✓ Eli Kaydet (×2) & Sıradaki El':'✓ Eli Kaydet & Sıradaki El';
    btn.style.background='';btn.style.color='';
  },1200);
}

// ═══ NAME EDIT ══════════════════════════════════════
function editName(idx){
  const el=document.getElementById('nm-'+idx);
  el.contentEditable='true';el.focus();
  const range=document.createRange();range.selectNodeContents(el);
  const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
}
function saveName(idx){
  const el=document.getElementById('nm-'+idx);
  el.contentEditable='false';
  const v=el.textContent.trim();
  if(!v){el.textContent=S.players[idx].name;return;}
  S.players[idx].name=v;
  S.history.forEach(h=>{if(h.idx===idx)h.name=v;});
  save();renderHistory();renderDealer();
}

// ═══ MODE ═══════════════════════════════════════════
function setMode(m){
  S.mode=m;save();
  document.getElementById('mode-101').style.cssText=
    m==='101'?'border-radius:100px;padding:6px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#fff;color:#1e3a5f;box-shadow:0 2px 10px rgba(0,0,0,.2);transition:all .2s'
             :'border-radius:100px;padding:6px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.5);transition:all .2s';
  document.getElementById('mode-okey').style.cssText=
    m==='okey'?'border-radius:100px;padding:6px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#fff;color:#1e3a5f;box-shadow:0 2px 10px rgba(0,0,0,.2);transition:all .2s'
              :'border-radius:100px;padding:6px 20px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.5);transition:all .2s';
  updateHint();renderPlayers();
}
function updateHint(){
  document.getElementById('mode-hint').textContent=
    S.mode==='101'?'Az puan \u2192 birinci':'\u00c7ok puan \u2192 birinci';
}

// ═══ RESET ══════════════════════════════════════════
function resetGame(){
  if(!confirm('T\u00fcm skorlar\u0131, el ge\u00e7mi\u015fini ve analiti\u011fi s\u0131f\u0131rlamak istiyorsunuz?'))return;
  S.players.forEach(p=>p.score=0);
  S.history=[];S.rounds=[];S.moveNo=0;S.dealer=0;
  save();renderAll();renderDealer();
}

// ═══ RENDER ALL ═════════════════════════════════════
function renderAll(){renderPlayers();renderHistory();}

function renderPlayers(){
  const r=ranks();
  document.getElementById('players-grid').innerHTML=S.players.map((p,idx)=>{
    const rank=r[idx];
    const c=PLAYER_COLORS[idx];
    const bg=BG_COLORS[idx];
    const isLeader=rank===1;
    const scoreColor=p.score<0?'#c0392b':p.score===0?'#cbd5e1':c;
    const scoreStr=p.score>0?'+'+p.score:String(p.score);
    const isDealer=S.dealer===idx;
    const glowStyle=isLeader?`box-shadow:0 0 0 2px ${c},0 6px 24px ${c}33;`:'';

    return `
<div class="card p-0 flex flex-col overflow-hidden" style="${glowStyle}">
  <!-- Top strip -->
  <div style="height:3px;background:${c};"></div>
  <div class="p-3 flex flex-col gap-2.5">
    <!-- Rank + name + dealer badge -->
    <div class="flex items-center gap-1.5 min-w-0">
      <span class="rb rb-${rank}">${rank}</span>
      <span id="nm-${idx}" class="nm flex-1 text-sm font-bold truncate cursor-pointer" style="color:#1e1b4b;"

      >${escH(p.name)}</span>
      ${isDealer?`<span class="text-[14px]" title="Dağıtıcı">🃏</span>`:''}
      <button onclick="editName(${idx})" class="flex-shrink-0 opacity-25 hover:opacity-60 transition-opacity p-0.5" style="color:${c}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
    <!-- Score -->
    <div class="text-center py-0.5">
      <div id="sc-${idx}" class="text-[2rem] font-black leading-none" style="color:${scoreColor};letter-spacing:-.03em">${scoreStr}</div>
      <p class="text-[9px] uppercase tracking-widest font-semibold mt-0.5" style="color:${c}88">${S.mode==='101'?'ceza':'puan'}</p>
    </div>
    <!-- Input + Ekle -->
    <div class="flex gap-1.5">
      <input type="number" id="inp-${idx}" class="sc-inp" placeholder="Puan"
        onfocus="this.style.borderColor='${c}'"
        onblur="this.style.borderColor=''"
        onkeydown="if(event.key==='Enter')addCustom(${idx})">
      <button onclick="addCustom(${idx})"
        class="flex-shrink-0 text-white text-xs font-bold rounded-[10px] active:scale-90 transition-transform"
        style="background:${c};height:42px;padding:0 12px;min-width:48px;box-shadow:0 4px 12px ${c}44">
        Ekle
      </button>
    </div>
    <!-- Quick buttons -->
    <div class="grid grid-cols-3 gap-1">
      <button onclick="addScore(${idx},101)" class="btn-outline">+101</button>
      <button onclick="addScore(${idx},202)" class="btn-outline">+202</button>
      <button onclick="addScore(${idx},-101)" class="btn-red">&minus;101</button>
    </div>
  </div>
</div>`;
  }).join('');
}

function renderHistory(){
  const list=document.getElementById('hist-list');
  const cnt=document.getElementById('hist-count');
  const roundCount=S.rounds.length;
  const histCount=S.history.length;
  cnt.textContent=roundCount+' el · '+histCount+' hamle';

  if(!S.history.length&&!S.rounds.length){
    list.innerHTML='<p class="text-center text-xs text-gray-300 py-5">Hen\u00fcz el oynanmad\u0131</p>';return;
  }

  // El kayıtları + ham hamleler birlikte göster
  let html='';

  // El özetleri
  if(S.rounds.length){
    html+=S.rounds.slice().reverse().map(rd=>{
      const dbl=rd.double?'<span class="text-[9px] font-bold px-1.5 py-0.5 rounded-full ml-1" style="background:#fef3c7;color:#92400e">×2</span>':'';
      const scores=rd.scores.map((s,i)=>
        `<span class="font-bold" style="color:${PLAYER_COLORS[i]}">${s>0?'+':''  }${s}</span>`
      ).join(' / ');
      return `
<div class="h-row flex-col items-start gap-1">
  <div class="flex items-center justify-between w-full">
    <span class="text-[10px] font-black uppercase tracking-wider" style="color:#c9a84c">El ${rd.el} ${dbl}</span>
    <span class="text-[9px] text-gray-400">Dağıtıcı: ${escH(S.players[rd.dealer]?.name||'?')}</span>
  </div>
  <p class="text-xs">${scores}</p>
</div>`;
    }).join('');
  }

  // Son 5 ham hamle
  if(S.history.length){
    html+=`<p class="text-[9px] font-bold uppercase tracking-wider mt-2 mb-1" style="color:#c9a84c">Son Hamleler</p>`;
    html+=S.history.slice(0,8).map(h=>{
      const neg=h.amount<0;
      const amtStr=(neg?'':'+') +h.amount;
      const amtColor=neg?'#c0392b':PLAYER_COLORS[h.idx];
      return `
<div class="h-row">
  <div class="flex items-center gap-2 min-w-0">
    <div class="w-6 h-6 rounded-full flex-shrink-0 flex items-center justify-center text-white font-black text-[10px]"
      style="background:${PLAYER_COLORS[h.idx]}">${h.idx+1}</div>
    <div>
      <p class="text-xs font-bold text-gray-700 truncate">${escH(h.name)}</p>
      <p class="text-[10px] text-gray-400">${h.time} · Toplam: <b style="color:${PLAYER_COLORS[h.idx]}">${h.total>0?'+':''}${h.total}</b></p>
    </div>
  </div>
  <span class="text-sm font-black ml-2 flex-shrink-0" style="color:${amtColor}">${amtStr}</span>
</div>`;
    }).join('');
  }

  list.innerHTML=html;
}

// ═══ ANALİTİK ═══════════════════════════════════════
function showAnalytics(){
  if(S.rounds.length<1){alert('En az 1 el kaydedilmeli!');return;}

  // Unvanları hesapla
  computeTitles();

  // Grafik
  buildChart();

  document.getElementById('analytics-modal').style.display='flex';

function computeTitles(){
  const grid=document.getElementById('titles-grid');

  // En çok ceza yiyen (101 modunda en yüksek skor, okey'de en düşük)
  const scores=S.players.map((p,i)=>({i,s:p.score,name:p.name}));
  const mostPenalty=S.mode==='101'?
    scores.reduce((a,b)=>a.s>b.s?a:b):
    scores.reduce((a,b)=>a.s<b.s?a:b);

  // Geri Dönüş Kralı: en fazla tur kazanıp son durumda iyi olan
  // (en büyük negatif delta yaşayan, yani en kötüden en iyiye giden)
  let comebackKing=null;
  if(S.rounds.length>=2){
    let maxDelta=-Infinity;
    S.players.forEach((p,i)=>{
      const midScore=S.rounds[Math.floor(S.rounds.length/2)].scores[i];
      const finalScore=p.score;
      const delta=S.mode==='101'?midScore-finalScore:finalScore-midScore;
      if(delta>maxDelta){maxDelta=delta;comebackKing={i,name:p.name,delta};}
    });
  }

  // Lider
  const r=ranks();
  const leader=S.players[Object.entries(r).find(([,v])=>v===1)[0]];

  // En tutarlı: en düşük standart sapma
  let consistentPlayer=null;
  if(S.rounds.length>=2){
    let minStd=Infinity;
    S.players.forEach((p,i)=>{
      const diffs=S.rounds.slice(1).map((rd,ri)=>Math.abs(rd.scores[i]-S.rounds[ri].scores[i]));
      const avg=diffs.reduce((a,b)=>a+b,0)/diffs.length;
      const std=Math.sqrt(diffs.map(d=>(d-avg)**2).reduce((a,b)=>a+b,0)/diffs.length);
      if(std<minStd){minStd=std;consistentPlayer={i,name:p.name,std:std.toFixed(1)};}
    });
  }

  const titles=[
    {icon:'🔥',label:'En Çok Ceza',name:mostPenalty.name,sub:mostPenalty.s+' puan',color:PLAYER_COLORS[mostPenalty.i]},
    {icon:'👑',label:'Şu Anlık Lider',name:leader.name,sub:'1. sıra',color:PLAYER_COLORS[S.players.indexOf(leader)]},
    comebackKing?{icon:'⚡',label:'Geri Dönüş Kralı',name:comebackKing.name,sub:'+'+comebackKing.delta+' fark',color:PLAYER_COLORS[comebackKing.i]}:null,
    consistentPlayer?{icon:'🎯',label:'En Tutarlı',name:consistentPlayer.name,sub:'σ='+consistentPlayer.std,color:PLAYER_COLORS[consistentPlayer.i]}:null,
  ].filter(Boolean);

  grid.innerHTML=titles.map(t=>`
<div class="rounded-xl p-3 text-center" style="background:${t.color}15;border:1.5px solid ${t.color}33">
  <div class="text-2xl mb-1">${t.icon}</div>
  <p class="text-[9px] font-bold uppercase tracking-wider mb-0.5" style="color:${t.color}">${t.label}</p>
  <p class="text-sm font-black" style="color:#1e3a5f">${escH(t.name)}</p>
  <p class="text-[10px] text-gray-400 font-medium">${t.sub}</p>
</div>`).join('');
}

function buildChart(){
  const canvas=document.getElementById('score-chart');
  if(chartInst){chartInst.destroy();chartInst=null;}

  const labels=S.rounds.map(r=>'El '+r.el);
  const datasets=S.players.map((p,i)=>({
    label:p.name,
    data:S.rounds.map(r=>r.scores[i]),
    borderColor:PLAYER_COLORS[i],
    backgroundColor:PLAYER_COLORS[i]+'22',
    borderWidth:2.5,
    pointRadius:4,
    pointBackgroundColor:PLAYER_COLORS[i],
    tension:.35,
    fill:false
  }));

  chartInst=new Chart(canvas,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,
      plugins:{
        legend:{labels:{font:{family:'Inter',size:11},color:'#374151',boxWidth:12,padding:12}},
        tooltip:{bodyFont:{family:'Inter'},titleFont:{family:'Inter'}}
      },
      scales:{
        x:{grid:{color:'#f3f4f6'},ticks:{font:{family:'Inter',size:10},color:'#6b7280'}},
        y:{grid:{color:'#f3f4f6'},ticks:{font:{family:'Inter',size:10},color:'#6b7280'}}
      }
    }
  });
}

function toggleQR(){
  qrVisible=!qrVisible;
  document.getElementById('qr-panel').style.display=qrVisible?'block':'none';
  document.getElementById('qr-btn').style.background=
    qrVisible?'rgba(255,255,255,.2)':'rgba(255,255,255,.08)';
  if(qrVisible&&!qrBuilt)buildQR();
}
function buildQR(){
  const url=window.location.href;
  document.getElementById('qr-url').textContent=url;
  const c=document.getElementById('qr-code');c.innerHTML='';
  new QRCode(c,{text:url,width:164,height:164,colorDark:'#1e3a5f',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
  qrBuilt=true;
}

function escH(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
