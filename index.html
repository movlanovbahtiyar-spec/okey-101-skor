<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yancı">
<link rel="manifest" href="manifest.json">
<title>Yancı — Skor Takip</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════
   BASE
══════════════════════════════════════════ */
*{font-family:'Inter',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;box-sizing:border-box}
.font-playfair{font-family:'Playfair Display',serif}

:root{
  --navy:#0f172a; --navy2:#1e293b; --navy3:#334155;
  --gold:#f59e0b; --gold2:#fbbf24; --gold3:#fde68a;
  --red:#ef4444; --green:#10b981;
  --surface:#1e293b; --surface2:#334155;
  --border:rgba(255,255,255,.08);
  --text:#f8fafc; --text2:#94a3b8; --text3:#64748b;
  --p0:#3b82f6; --p1:#10b981; --p2:#f59e0b; --p3:#ef4444;
}

html{scroll-behavior:smooth}

body{
  background:var(--navy);
  min-height:100dvh;
  background-image:
    radial-gradient(ellipse 60% 40% at 50% -10%, rgba(59,130,246,.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 90% 50%, rgba(245,158,11,.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 0% 80%, rgba(16,185,129,.07) 0%, transparent 60%);
  background-attachment:fixed;
}

/* ══════════════════════════════════════════
   ANIMATIONS
══════════════════════════════════════════ */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{
  from{opacity:0;transform:scale(.88)}
  to{opacity:1;transform:scale(1)}
}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-12px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes modalIn{
  from{opacity:0;transform:translateY(40px) scale(.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes pop{
  0%{transform:scale(1)}
  35%{transform:scale(1.22)}
  65%{transform:scale(.95)}
  100%{transform:scale(1)}
}
@keyframes scorePop{
  0%{transform:scale(1);filter:brightness(1)}
  40%{transform:scale(1.18);filter:brightness(1.4)}
  100%{transform:scale(1);filter:brightness(1)}
}
@keyframes shimmer{
  0%{background-position:-200% center}
  100%{background-position:200% center}
}
@keyframes dealerPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,.5)}
  50%{box-shadow:0 0 0 6px rgba(245,158,11,0)}
}
@keyframes glowPulse{
  0%,100%{opacity:.7}50%{opacity:1}
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(.8)}
}
@keyframes rippleOut{
  0%{transform:scale(0);opacity:.35}
  100%{transform:scale(3.5);opacity:0}
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes toast-in{
  from{transform:translateY(100%) scale(.9);opacity:0}
  to{transform:translateY(0) scale(1);opacity:1}
}
@keyframes toast-out{
  from{transform:translateY(0) scale(1);opacity:1}
  to{transform:translateY(100%) scale(.9);opacity:0}
}
/* Okey taşı animasyonları */
@keyframes tileFloat{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-8px) rotate(3deg)}
}
@keyframes tileSpin{
  0%{transform:rotateY(0deg) scale(1)}
  40%{transform:rotateY(90deg) scale(.85)}
  60%{transform:rotateY(90deg) scale(.85)}
  100%{transform:rotateY(0deg) scale(1)}
}
@keyframes tileBounceIn{
  0%{transform:scale(0) rotate(-15deg);opacity:0}
  60%{transform:scale(1.15) rotate(5deg);opacity:1}
  80%{transform:scale(.95) rotate(-2deg)}
  100%{transform:scale(1) rotate(0deg);opacity:1}
}
@keyframes tileShake{
  0%,100%{transform:rotate(0deg)}
  20%{transform:rotate(-12deg)}
  40%{transform:rotate(12deg)}
  60%{transform:rotate(-8deg)}
  80%{transform:rotate(8deg)}
}
@keyframes tileSlideLeft{
  0%{transform:translateX(0)}
  30%{transform:translateX(-6px) rotate(-5deg)}
  60%{transform:translateX(4px) rotate(3deg)}
  100%{transform:translateX(0) rotate(0deg)}
}
@keyframes rankChange{
  0%{transform:scale(1)}
  50%{transform:scale(1.4)}
  100%{transform:scale(1)}
}
@keyframes headerGlow{
  0%,100%{text-shadow:0 0 20px rgba(245,158,11,.3)}
  50%{text-shadow:0 0 40px rgba(245,158,11,.6),0 0 80px rgba(245,158,11,.2)}
}
@keyframes borderFlow{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ══════════════════════════════════════════
   CARDS
══════════════════════════════════════════ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  box-shadow:0 4px 24px rgba(0,0,0,.4),0 1px 0 rgba(255,255,255,.04) inset;
}
.card-animate{
  animation:fadeSlideUp .45s cubic-bezier(.22,1,.36,1) both;
}
.player-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 4px 20px rgba(0,0,0,.35);
  transition:transform .2s ease,box-shadow .2s ease;
  overflow:hidden;
  position:relative;
}
.player-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.player-card.leader-glow{
  box-shadow:0 0 0 1.5px var(--leader-color),0 8px 32px rgba(0,0,0,.5),0 0 24px color-mix(in srgb,var(--leader-color) 25%,transparent);
  animation:glowPulse 2.5s ease-in-out infinite;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.header-card{
  background:linear-gradient(145deg,#1e293b 0%,#0f172a 100%);
  border:1px solid rgba(255,255,255,.07);
  border-radius:22px;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.header-card::before{
  content:'';
  position:absolute;
  inset:-1px;
  border-radius:22px;
  background:linear-gradient(135deg,rgba(245,158,11,.25) 0%,transparent 40%,transparent 60%,rgba(59,130,246,.15) 100%);
  pointer-events:none;
}
.header-title{
  animation:headerGlow 4s ease-in-out infinite;
  background:linear-gradient(135deg,#fff 0%,#fde68a 40%,#f59e0b 70%,#fff 100%);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 4s linear infinite, headerGlow 4s ease-in-out infinite;
}

/* ══════════════════════════════════════════
   MODE TOGGLE
══════════════════════════════════════════ */
.mode-track{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.1);
  border-radius:100px;
  padding:3px;
  display:inline-flex;
}
.mode-btn{
  border-radius:100px;
  padding:7px 22px;
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:all .25s cubic-bezier(.22,1,.36,1);
  border:none;
  color:var(--text2);
  background:transparent;
  position:relative;
}
.mode-btn.active{
  background:#fff;
  color:#0f172a;
  box-shadow:0 2px 12px rgba(0,0,0,.35);
}

/* ══════════════════════════════════════════
   DEALER BAR
══════════════════════════════════════════ */
.dealer-card{
  background:linear-gradient(135deg,rgba(30,41,59,.9) 0%,rgba(15,23,42,.9) 100%);
  border:1px solid rgba(245,158,11,.2);
  border-radius:16px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}
.dealer-badge{
  animation:dealerPulse 2s infinite;
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  color:#0f172a;
  font-weight:900;
  font-size:9px;
  padding:3px 8px;
  border-radius:100px;
  letter-spacing:.08em;
  box-shadow:0 2px 8px rgba(245,158,11,.4);
}

/* ══════════════════════════════════════════
   TOGGLE SWITCH
══════════════════════════════════════════ */
.sw-track{
  width:46px;height:26px;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  border-radius:100px;
  position:relative;cursor:pointer;
  transition:all .25s cubic-bezier(.22,1,.36,1);
  flex-shrink:0;
}
.sw-track.on{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  border-color:var(--gold);
  box-shadow:0 0 12px rgba(245,158,11,.4);
}
.sw-thumb{
  width:20px;height:20px;
  background:#fff;
  border-radius:50%;
  position:absolute;top:2px;left:2px;
  transition:left .25s cubic-bezier(.22,1,.36,1);
  box-shadow:0 1px 4px rgba(0,0,0,.3);
}
.sw-track.on .sw-thumb{left:24px}

/* ══════════════════════════════════════════
   SCORE INPUT
══════════════════════════════════════════ */
.sc-inp{
  border:1.5px solid rgba(255,255,255,.1);
  border-radius:11px;
  padding:0 12px;height:44px;
  font-size:15px;font-weight:700;
  color:var(--text);
  background:rgba(255,255,255,.05);
  width:100%;outline:none;
  text-align:center;
  -moz-appearance:textfield;
  transition:border-color .2s,background .2s,box-shadow .2s;
}
.sc-inp:focus{
  border-color:rgba(255,255,255,.3);
  background:rgba(255,255,255,.08);
  box-shadow:0 0 0 3px rgba(255,255,255,.05);
}
.sc-inp::-webkit-outer-spin-button,.sc-inp::-webkit-inner-spin-button{-webkit-appearance:none}
.sc-inp.err{border-color:var(--red)!important;background:rgba(239,68,68,.08)!important;animation:pop .3s}

/* ══════════════════════════════════════════
   RANK BADGES
══════════════════════════════════════════ */
.rb{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;flex-shrink:0;
  transition:all .3s cubic-bezier(.22,1,.36,1);
}
.rb-1{background:linear-gradient(135deg,#f59e0b,#fcd34d);color:#78350f;box-shadow:0 2px 10px rgba(245,158,11,.5)}
.rb-2{background:linear-gradient(135deg,#64748b,#94a3b8);color:#fff;box-shadow:0 2px 8px rgba(100,116,139,.4)}
.rb-3{background:linear-gradient(135deg,#92400e,#b45309);color:#fde68a;box-shadow:0 2px 8px rgba(180,83,9,.4)}
.rb-4{background:rgba(255,255,255,.08);color:var(--text3);border:1px solid rgba(255,255,255,.1)}
.rb.rank-change{animation:rankChange .4s cubic-bezier(.34,1.56,.64,1)}

/* ══════════════════════════════════════════
   SCORE DISPLAY
══════════════════════════════════════════ */
.sc-pop{animation:scorePop .35s cubic-bezier(.34,1.56,.64,1)}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn-primary{
  background:linear-gradient(135deg,var(--gold) 0%,var(--gold2) 100%);
  color:#0f172a;border:none;border-radius:14px;
  font-weight:900;font-size:14px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .2s cubic-bezier(.22,1,.36,1);
  height:50px;padding:0 20px;
  box-shadow:0 4px 20px rgba(245,158,11,.4),0 1px 0 rgba(255,255,255,.3) inset;
  position:relative;overflow:hidden;
  letter-spacing:.01em;
  font-family:'Playfair Display',serif;
}
.btn-primary:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 28px rgba(245,158,11,.5),0 1px 0 rgba(255,255,255,.3) inset;
}
.btn-primary:active{transform:scale(.96) translateY(0)}
.btn-primary.saved{
  background:linear-gradient(135deg,var(--green),#34d399)!important;
  box-shadow:0 4px 20px rgba(16,185,129,.4)!important;
}

.btn-navy{
  background:rgba(255,255,255,.07);
  color:var(--text);border:1px solid rgba(255,255,255,.1);
  border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .2s;height:44px;padding:0 16px;
  position:relative;overflow:hidden;
}
.btn-navy:hover{background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.18)}
.btn-navy:active{transform:scale(.96)}

.btn-outline{
  background:rgba(255,255,255,.04);
  color:var(--text2);
  border:1px solid rgba(255,255,255,.09);
  border-radius:10px;font-weight:700;font-size:11px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  height:34px;padding:0 6px;
  transition:all .18s;
  position:relative;overflow:hidden;
}
.btn-outline:active{transform:scale(.9)}

.btn-red{
  background:rgba(239,68,68,.08);
  color:#f87171;
  border:1px solid rgba(239,68,68,.2);
  border-radius:10px;font-weight:700;font-size:11px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  height:34px;padding:0 6px;
  transition:all .18s;
  position:relative;overflow:hidden;
}
.btn-red:active{transform:scale(.9)}

/* Add button with player color */
.btn-add{
  flex-shrink:0;color:#fff;text-xs font-bold;
  border-radius:11px;active:scale-90;
  transition:all .2s cubic-bezier(.22,1,.36,1);
  height:44px;padding:0 12px;min-width:52px;
  border:none;cursor:pointer;
  position:relative;overflow:hidden;
  font-weight:800;font-size:12px;
}
.btn-add:active{transform:scale(.88)}

/* Ripple */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.25);
  transform:scale(0);
  animation:rippleOut .55s linear;
  pointer-events:none;
}

/* ══════════════════════════════════════════
   NAME EDITABLE
══════════════════════════════════════════ */
.nm{outline:none;border-radius:5px;padding:0 3px;transition:background .15s}
.nm:focus{background:rgba(255,255,255,.08)}

/* ══════════════════════════════════════════
   HISTORY
══════════════════════════════════════════ */
.h-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);
  animation:fadeSlideUp .3s ease both;
}
.h-row:last-child{border-bottom:none}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  z-index:50;display:flex;align-items:flex-end;
  justify-content:center;
  padding:0;
  animation:fadeIn .2s ease;
}
.modal-sheet{
  background:var(--surface);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px 24px 0 0;
  width:100%;max-width:420px;
  max-height:92dvh;overflow-y:auto;
  animation:modalIn .35s cubic-bezier(.22,1,.36,1);
  box-shadow:0 -8px 40px rgba(0,0,0,.6);
}
.modal-handle{
  width:40px;height:4px;background:rgba(255,255,255,.15);
  border-radius:100px;margin:12px auto 0;
}

/* ══════════════════════════════════════════
   STORY MODAL
══════════════════════════════════════════ */
.story-modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  z-index:50;display:flex;align-items:center;
  justify-content:center;padding:20px;
  animation:fadeIn .2s ease;
}
#story-card{
  width:360px;min-height:640px;
  background:linear-gradient(155deg,#1e293b 0%,#0f172a 60%,#1a2e50 100%);
  border-radius:24px;padding:32px 24px;color:#fff;
  display:flex;flex-direction:column;
  animation:scaleIn .35s cubic-bezier(.22,1,.36,1);
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
#toast-container{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;flex-direction:column;align-items:center;gap:8px;
  pointer-events:none;
}
.toast{
  background:rgba(30,41,59,.95);
  border:1px solid rgba(255,255,255,.12);
  border-radius:100px;
  padding:10px 20px;
  color:#fff;font-size:13px;font-weight:700;
  backdrop-filter:blur(12px);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:toast-in .3s cubic-bezier(.22,1,.36,1);
  white-space:nowrap;
  display:flex;align-items:center;gap:8px;
}
.toast.hiding{animation:toast-out .25s ease forwards}
.toast-success{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.15)}
.toast-error{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.15)}

/* ══════════════════════════════════════════
   FLOAT SCORE
══════════════════════════════════════════ */
.float-score{
  position:fixed;pointer-events:none;
  font-size:20px;font-weight:900;
  animation:floatUp .8s ease-out forwards;
  z-index:200;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
}

/* ══════════════════════════════════════════
   OKEY TAŞI
══════════════════════════════════════════ */
.okey-tile{
  position:fixed;pointer-events:none;
  width:32px;height:42px;
  border-radius:5px;
  background:linear-gradient(145deg,#fefce8,#fef3c7);
  border:2px solid #d97706;
  box-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;
  z-index:200;
  transform-origin:center center;
}
.okey-tile.falling{
  animation:tileFloat 1s ease-in-out infinite;
}

/* Arka plan dekoratif taşlar */
.bg-tile{
  position:fixed;pointer-events:none;
  border-radius:4px;
  background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01));
  border:1px solid rgba(255,255,255,.05);
  display:flex;align-items:center;justify-content:center;
  z-index:0;
  user-select:none;
}

/* ══════════════════════════════════════════
   QR PANEL
══════════════════════════════════════════ */
.qr-panel{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  animation:slideDown .3s cubic-bezier(.22,1,.36,1);
}

/* ══════════════════════════════════════════
   SCROLLBAR
══════════════════════════════════════════ */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}

/* ══════════════════════════════════════════
   KAT SELECTOR (Okey modu)
══════════════════════════════════════════ */
.kat-panel{
  background:linear-gradient(135deg,rgba(30,41,59,.95),rgba(15,23,42,.95));
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  box-shadow:0 4px 20px rgba(0,0,0,.35);
}
.kat-btn{
  flex:1;min-width:0;
  border-radius:12px;
  border:1.5px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  color:var(--text2);
  font-weight:800;
  font-size:12px;
  cursor:pointer;
  padding:8px 4px 6px;
  transition:all .2s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;align-items:center;gap:1px;
  line-height:1.2;
  position:relative;
  overflow:hidden;
}
.kat-btn:active{transform:scale(.92)}
.kat-btn.active{
  background:var(--kat-color,var(--gold));
  border-color:var(--kat-color,var(--gold));
  color:#0f172a;
  box-shadow:0 4px 16px color-mix(in srgb,var(--kat-color,var(--gold)) 45%,transparent);
}
.kat-btn .kat-num{font-size:16px;font-weight:900;line-height:1}
.kat-btn .kat-name{font-size:8px;font-weight:700;opacity:.75;letter-spacing:.04em}

/* ══════════════════════════════════════════
   STAGGER DELAYS
══════════════════════════════════════════ */
.delay-1{animation-delay:.05s}
.delay-2{animation-delay:.1s}
.delay-3{animation-delay:.15s}
.delay-4{animation-delay:.2s}

<script>
// ══════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════
const PLAYER_COLORS = ['#3b82f6','#10b981','#f59e0b','#ef4444'];
const BG_COLORS     = ['rgba(59,130,246,.12)','rgba(16,185,129,.12)','rgba(245,158,11,.12)','rgba(239,68,68,.12)'];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S = {
  mode: '101',
  players: [
    {name:'Oyuncu 1',score:0},
    {name:'Oyuncu 2',score:0},
    {name:'Oyuncu 3',score:0},
    {name:'Oyuncu 4',score:0}
  ],
  rounds: [],
  dealer: 0,
  double: false,
  okeyKat: 1,
  moveNo: 0,
  history: [],
  venue: {name:'', logoUrl:''}
};

let qrVisible=false, qrBuilt=false, chartInst=null;
let prevRanks = {};

// ══════════════════════════════════════════
// PERSIST
// ══════════════════════════════════════════
function load(){
  try{const r=localStorage.getItem('okey101_v3');if(r)S=JSON.parse(r);}catch(_){}
}
function save(){localStorage.setItem('okey101_v3',JSON.stringify(S));}

// ══════════════════════════════════════════
// RANKS
// ══════════════════════════════════════════
function ranks(){
  const arr=S.players.map((p,i)=>({i,s:p.score}));
  arr.sort((a,b)=>a.s-b.s); // her iki modda da az puan → birinci
  const r={};arr.forEach((p,pos)=>{r[p.i]=pos+1;});return r;
}

// ══════════════════════════════════════════
// DEALER
// ══════════════════════════════════════════
function renderDealer(){
  const p=S.players[S.dealer];
  const av=document.getElementById('dealer-avatar');
  const nm=document.getElementById('dealer-name');
  if(av){
    av.textContent=(S.dealer+1).toString();
    av.style.background=PLAYER_COLORS[S.dealer];
    av.style.boxShadow=`0 4px 14px ${PLAYER_COLORS[S.dealer]}55`;
  }
  if(nm)nm.textContent=p.name;
}

// ══════════════════════════════════════════
// DOUBLE SWITCH
// ══════════════════════════════════════════
function toggleDouble(){
  S.double=!S.double;
  const sw=document.getElementById('double-sw');
  if(sw)sw.classList.toggle('on',S.double);
  save();
  updateSaveBtn();
  showToast(S.double?'🎯 Çift mod açık — puanlar ×2':'Çift mod kapalı');
}
function updateSaveBtn(){
  const btn=document.getElementById('save-round-btn');
  if(!btn)return;
  if(S.mode==='okey' && S.okeyKat>1){
    btn.textContent=`✓ Eli Kaydet (×${S.okeyKat}) & Sıradaki El`;
  } else if(S.mode==='101' && S.double){
    btn.textContent='✓ Eli Kaydet (×2) & Sıradaki El';
  } else {
    btn.textContent='✓ Eli Kaydet & Sıradaki El';
  }
}

// ══════════════════════════════════════════
// RIPPLE EFFECT
// ══════════════════════════════════════════
function addRipple(e, el){
  const r=el.getBoundingClientRect();
  const size=Math.max(r.width,r.height)*2;
  const x=e.clientX-r.left-size/2;
  const y=e.clientY-r.top-size/2;
  const rip=document.createElement('span');
  rip.className='ripple';
  rip.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px`;
  el.appendChild(rip);
  setTimeout(()=>rip.remove(),600);
}

// ══════════════════════════════════════════
// FLOAT SCORE ANIMATION
// ══════════════════════════════════════════
function floatScore(el, amount, color){
  const rect=el.getBoundingClientRect();
  const f=document.createElement('div');
  f.className='float-score';
  f.textContent=(amount>0?'+':'')+amount;
  f.style.cssText=`color:${color};left:${rect.left+rect.width/2-20}px;top:${rect.top+window.scrollY-10}px`;
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),850);
}

// ══════════════════════════════════════════
// OKEY TAŞI ANİMASYONU
// ══════════════════════════════════════════
const TILE_SYMBOLS = [
  {n:'1',c:'#ef4444'},{n:'2',c:'#ef4444'},{n:'3',c:'#ef4444'},
  {n:'4',c:'#ef4444'},{n:'5',c:'#ef4444'},{n:'6',c:'#ef4444'},
  {n:'7',c:'#ef4444'},{n:'8',c:'#ef4444'},{n:'9',c:'#ef4444'},
  {n:'10',c:'#ef4444'},{n:'11',c:'#ef4444'},{n:'12',c:'#ef4444'},{n:'13',c:'#ef4444'},
  {n:'1',c:'#1e3a5f'},{n:'7',c:'#1e3a5f'},{n:'13',c:'#1e3a5f'},
  {n:'1',c:'#16a34a'},{n:'7',c:'#16a34a'},{n:'13',c:'#16a34a'},
  {n:'★',c:'#f59e0b'} // joker
];

function fireOkeyTiles(){
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const sym=TILE_SYMBOLS[Math.floor(Math.random()*TILE_SYMBOLS.length)];
      const t=document.createElement('div');
      t.className='okey-tile';
      const startX=15+Math.random()*70;
      const startY=20+Math.random()*50;
      const rot=(Math.random()-0.5)*40;
      t.style.cssText=`
        left:${startX}%;top:${startY}%;
        color:${sym.c};
        transform:rotate(${rot}deg) scale(0);
        animation:tileBounceIn .5s cubic-bezier(.22,1,.36,1) forwards;
      `;
      t.textContent=sym.n;
      document.body.appendChild(t);

      // Taşı uçur ve kaldır
      setTimeout(()=>{

function addScore(idx, amount, event){
  const multiplier = S.mode==='okey' ? S.okeyKat : (S.double ? 2 : 1);
  const real = amount * multiplier;
  S.players[idx].score+=real;
  S.moveNo++;
  S.history.unshift({
    no:S.moveNo,idx,name:S.players[idx].name,
    amount:real,total:S.players[idx].score,
    time:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})
  });
  save();
  renderAll();

  requestAnimationFrame(()=>{
    const scEl=document.getElementById('sc-'+idx);
    if(scEl){
      scEl.classList.remove('sc-pop');void scEl.offsetWidth;scEl.classList.add('sc-pop');
      floatScore(scEl, real, real<0?'#f87171':PLAYER_COLORS[idx]);
    }
    if(event){
      const btn=event.currentTarget||event.target;
      if(btn)addRipple(event,btn);
    }
  });
}

function addCustom(idx, event){
  const inp=document.getElementById('inp-'+idx);
  const val=parseFloat(inp.value);
  if(isNaN(val)||val===0){
    inp.classList.add('err');setTimeout(()=>inp.classList.remove('err'),700);inp.focus();return;
  }
  addScore(idx,val,event);inp.value='';
}

function saveRound(){
  const allZero=S.players.every(p=>p.score===0)&&S.rounds.length===0;
  if(allZero){showToast('⚠️ Önce puan girin!','error');return;}

  const entry={
    el:S.rounds.length+1,
    scores:S.players.map(p=>p.score),
    dealer:S.dealer,
    double:S.double,
    kat: S.mode==='okey' ? S.okeyKat : (S.double ? 2 : 1)
  };
  S.rounds.push(entry);
  S.dealer=(S.dealer+1)%4;

  save();renderAll();renderDealer();
  fireOkeyTiles();

  const btn=document.getElementById('save-round-btn');
  btn.classList.add('saved');
  btn.textContent='✓ El Kaydedildi!';
  showToast('🎉 El '+entry.el+' kaydedildi!','success');

  setTimeout(()=>{
    btn.classList.remove('saved');
    updateSaveBtn();
  },1500);
}

function computeTitles(){
  const grid=document.getElementById('titles-grid');
  const scores=S.players.map((p,i)=>({i,s:p.score,name:p.name}));
  const mostPenalty=scores.reduce((a,b)=>a.s>b.s?a:b);

  let comebackKing=null;
  if(S.rounds.length>=2){
    let maxDelta=-Infinity;
    S.players.forEach((p,i)=>{
      const midScore=S.rounds[Math.floor(S.rounds.length/2)].scores[i];
      const finalScore=p.score;
      const delta=midScore-finalScore;
      if(delta>maxDelta){maxDelta=delta;comebackKing={i,name:p.name,delta};}
    });
  }

  const r=ranks();
  const leader=S.players[parseInt(Object.entries(r).find(([,v])=>v===1)[0])];
  const leaderIdx=S.players.indexOf(leader);

  let consistentPlayer=null;
  if(S.rounds.length>=2){
    let minStd=Infinity;
    S.players.forEach((p,i)=>{
      const diffs=S.rounds.slice(1).map((rd,ri)=>Math.abs(rd.scores[i]-S.rounds[ri].scores[i]));
      const avg=diffs.reduce((a,b)=>a+b,0)/diffs.length;
      const std=Math.sqrt(diffs.map(d=>(d-avg)**2).reduce((a,b)=>a+b,0)/diffs.length);
      if(std<minStd){minStd=std;consistentPlayer={i,name:p.name,std:std.toFixed(1)};}
    });
  }

  const titles=[
    {icon:'🔥',label:'En Çok Ceza',name:mostPenalty.name,sub:mostPenalty.s+' puan',color:PLAYER_COLORS[mostPenalty.i]},
    {icon:'👑',label:'Şu Anlık Lider',name:leader.name,sub:'1. sıra',color:PLAYER_COLORS[leaderIdx]},
    comebackKing?{icon:'⚡',label:'Geri Dönüş Kralı',name:comebackKing.name,sub:'+'+comebackKing.delta+' fark',color:PLAYER_COLORS[comebackKing.i]}:null,
    consistentPlayer?{icon:'🎯',label:'En Tutarlı',name:consistentPlayer.name,sub:'σ='+consistentPlayer.std,color:PLAYER_COLORS[consistentPlayer.i]}:null,
  ].filter(Boolean);

  grid.innerHTML=titles.map((t,i)=>`
<div style="background:${t.color}18;border:1.5px solid ${t.color}35;border-radius:16px;padding:12px;text-align:center;animation:scaleIn .35s cubic-bezier(.22,1,.36,1) ${i*.07}s both">
  <div style="font-size:24px;margin-bottom:6px">${t.icon}</div>
  <p style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:${t.color};margin-bottom:3px">${t.label}</p>
  <p style="font-size:13px;font-weight:900;color:var(--text);margin-bottom:2px">${escH(t.name)}</p>
  <p style="font-size:10px;color:var(--text3);font-weight:600">${t.sub}</p>
</div>`).join('');
}

function buildChart(){
  const canvas=document.getElementById('score-chart');
  if(chartInst){chartInst.destroy();chartInst=null;}
  const labels=S.rounds.map(r=>'El '+r.el);
  const datasets=S.players.map((p,i)=>({
    label:p.name,
    data:S.rounds.map(r=>r.scores[i]),
    borderColor:PLAYER_COLORS[i],
    backgroundColor:PLAYER_COLORS[i]+'18',
    borderWidth:2.5,
    pointRadius:4,
    pointBackgroundColor:PLAYER_COLORS[i],
    pointBorderColor:'#1e293b',
    pointBorderWidth:1.5,
    tension:.4,fill:false
  }));
  chartInst=new Chart(canvas,{
    type:'line',data:{labels,datasets},
    options:{
      responsive:true,
      animation:{duration:600,easing:'easeOutQuart'},
      plugins:{
        legend:{labels:{font:{family:'Inter',size:11},color:'#94a3b8',boxWidth:12,padding:12}},
        tooltip:{bodyFont:{family:'Inter'},titleFont:{family:'Inter'},backgroundColor:'#1e293b',borderColor:'rgba(255,255,255,.1)',borderWidth:1}
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{font:{family:'Inter',size:10},color:'#64748b'}},
        y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{font:{family:'Inter',size:10},color:'#64748b'}}
      }
    }
  });
}

      showToast('📥 Görsel indirildi!','success');
    })
    .catch(()=>showToast('İndirme başarısız','error'));
}

// ══════════════════════════════════════════
// MODAL
// ══════════════════════════════════════════
function closeModal(id){
  const el=document.getElementById(id);
  el.style.opacity='0';
  el.style.transition='opacity .2s';
  setTimeout(()=>{el.style.display='none';el.style.opacity='';el.style.transition='';},200);
}

// ══════════════════════════════════════════
// QR
// ══════════════════════════════════════════
function toggleQR(){
  qrVisible=!qrVisible;
  const panel=document.getElementById('qr-panel');
  const btn=document.getElementById('qr-btn');
  panel.style.display=qrVisible?'block':'none';
  btn.style.background=qrVisible?'rgba(255,255,255,.15)':'rgba(255,255,255,.06)';
  btn.style.borderColor=qrVisible?'rgba(255,255,255,.3)':'rgba(255,255,255,.1)';
  if(qrVisible&&!qrBuilt)buildQR();
}
function buildQR(){
  const url=window.location.href;
  document.getElementById('qr-url').textContent=url;
  const c=document.getElementById('qr-code');c.innerHTML='';
  new QRCode(c,{text:url,width:164,height:164,colorDark:'#f8fafc',colorLight:'#1e293b',correctLevel:QRCode.CorrectLevel.M});
  qrBuilt=true;
}

// ══════════════════════════════════════════
// VENUE BRANDING
// ══════════════════════════════════════════
function renderVenue(){
  const strip=document.getElementById('venue-strip');
  if(!strip)return;
  const v=S.venue||{};
  if(!v.name){strip.style.display='none';return;}
  const logo=v.logoUrl
    ? `<img class="venue-logo" src="${escH(v.logoUrl)}" alt="${escH(v.name)}" onerror="this.style.display='none'">`
    : `<div class="venue-logo flex items-center justify-center text-[10px] font-black" style="color:rgba(245,158,11,.7)">📍</div>`;
  strip.style.display='block';
  strip.innerHTML=`
<div class="venue-strip">
  ${logo}
  <span class="venue-name">${escH(v.name)}</span>
  <button class="venue-edit-btn" onclick="showVenueSetup()">Düzenle</button>
</div>`;
}

function showVenueSetup(){
  const v=S.venue||{};
  document.getElementById('venue-name-input').value=v.name||'';
  document.getElementById('venue-logo-input').value=v.logoUrl||'';
  previewVenueLogo(v.logoUrl||'');
  document.getElementById('venue-modal').style.display='flex';
}

function previewVenueLogo(url){
  const wrap=document.getElementById('venue-logo-preview');
  const img=document.getElementById('venue-preview-img');
  const nm=document.getElementById('venue-preview-name');
  const nameVal=document.getElementById('venue-name-input').value.trim();
  if(url){
    img.src=url;
    nm.textContent=nameVal||'Logo önizlemesi';
    wrap.style.display='flex';
    wrap.style.background='rgba(255,255,255,.04)';
    wrap.style.border='1px solid rgba(255,255,255,.08)';
  } else {
    wrap.style.display='none';
  }
}

function saveVenueSetup(){
  const name=document.getElementById('venue-name-input').value.trim();
  const logoUrl=document.getElementById('venue-logo-input').value.trim();
  if(!name){
    document.getElementById('venue-name-input').style.borderColor='var(--red)';
    setTimeout(()=>document.getElementById('venue-name-input').style.borderColor='',1000);
    return;
  }
  if(!S.venue)S.venue={};
  S.venue.name=name;
  S.venue.logoUrl=logoUrl;
  save();
  renderVenue();
  closeModal('venue-modal');
  showToast('🏠 Mekan ayarlandı: '+name,'success');
}

function clearVenue(){
  S.venue={name:'',logoUrl:''};
  save();
  renderVenue();
  closeModal('venue-modal');
  showToast('Mekan bilgisi kaldırıldı');
}

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function escH(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
load();
if(!S.okeyKat) S.okeyKat=1;
if(!S.venue) S.venue={name:'',logoUrl:''};
setMode(S.mode);
updateHint();
updateSaveBtn();
const sw=document.getElementById('double-sw');
if(sw)sw.classList.toggle('on',S.double);
if(S.mode==='okey') syncKatUI();
renderAll();
renderDealer();
renderVenue();
initBgTiles();
</script>
</body>
